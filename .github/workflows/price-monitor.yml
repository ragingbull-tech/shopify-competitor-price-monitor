name: Price Monitor

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "30 13 * * 1"

jobs:
  monitor:
    runs-on: ubuntu-latest

    env:
      SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
      SHOPIFY_PRODUCT_HANDLE: ${{ secrets.SHOPIFY_PRODUCT_HANDLE }}
      COMPETITOR_NAME: ${{ secrets.COMPETITOR_NAME }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      REPORT_FROM: ${{ secrets.REPORT_FROM }}
      REPORT_TO: ${{ secrets.REPORT_TO }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run price monitor
        run: python main.py --source shopify --send-email
